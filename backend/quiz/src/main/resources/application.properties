# ─────────────────────────────────────────────────────────────────────────────
#  Interview Guide Quiz – Spring Boot Application Properties
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=interview-guide-quiz

# Server
server.port=8080

# ─── Spring AI ── OpenAI (GPT-4o) ────────────────────────────────────────────
# Set your OpenAI API key here OR override via environment variable:
#   Windows PowerShell:  $env:SPRING_AI_OPENAI_API_KEY="sk-proj-..."
#   Linux / macOS:       export SPRING_AI_OPENAI_API_KEY="sk-proj-..."
#
# Keys look like: sk-proj-xxxxxxxxxxxxxxxxxxxx  (starts with "sk-")
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:s8QxVNCuUziUxO80xFCLc522aEihiaAV1uOrEB3X9}

# OpenAI base URL (default – change only if using a corporate AI gateway)
spring.ai.openai.base-url=https://api.openai.com

# Model configuration
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7

# ─── HTTP client (OpenAiRestClientConfig) ────────────────────────────────────
# Connection / request timeout in seconds (default: 30 / 120)
app.openai.connect-timeout-seconds=30
app.openai.read-timeout-seconds=120

# Set to true ONLY if you are behind a corporate SSL-inspection proxy
# (e.g. Capgemini network) that re-signs HTTPS traffic with an internal CA.
# This bypasses SSL certificate verification for OpenAI calls only —
# it does NOT mutate any global JVM state.
app.openai.trust-all-ssl=true

# ─── Quiz behaviour ──────────────────────────────────────────────────────────
# Maximum number of Q&A pairs sampled per section for the AI context prompt.
# Increasing this improves question variety but raises token cost per call.
quiz.context.max-questions-per-section=20

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.dev.saad.quiz=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.apache.hc.client5=WARN
