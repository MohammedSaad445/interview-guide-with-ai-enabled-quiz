# ???????????????????????????????????????????????????????????????
# Interview Guide Quiz ? Spring Boot Application Properties
# ???????????????????????????????????????????????????????????????

spring.application.name=interview-guide-quiz

# Server
server.port=8080

# ????? Spring AI ? Google Gemini (GenAI) ???????????????????????
# Set your Gemini API key here OR override via environment variable:
#   Windows PowerShell:  $env:GOOGLE_API_KEY="your-key"
spring.ai.google.genai.api-key=${GEMINI_API_KEY}

# Gemini model configuration
spring.ai.google.genai.chat.options.model=gemini-2.5-flash-lite
spring.ai.google.genai.chat.options.temperature=0.7

# ????? HTTP client (Google GenAI config wrapper) ???????????????
# Connection / request timeout in seconds
app.genai.connect-timeout-seconds=30
app.genai.read-timeout-seconds=120

# If you're behind corporate SSL inspection proxy
app.genai.trust-all-ssl=true

# ????? Quiz behaviour ??????????????????????????????????????????
# Maximum number of Q&A pairs sampled per section for the AI context prompt.
quiz.context.max-questions-per-section=20

# ????? Logging ??????????????????????????????????????????????????
logging.level.dev.saad.quiz=INFO
logging.level.org.springframework.ai=DEBUG
logging.level.org.apache.hc.client5=WARN